[package]
name = "parser"
version = "0.1.0"
edition = "2024"
# Дефолтный исполняемый файл для cargo run
default-run = "parser"

# Секция генерируемых бинарников, создаём несколько
[[bin]]
name = "parser"
path = "src/main.rs"

[[bin]]
name = "comparer"
path = "src/bin/comparer.rs"

# Тут обязательно подчёркивание
[lib]
name = "parser"
path = "src/lib.rs"


[dependencies]
